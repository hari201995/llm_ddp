# lm_config.toml
[training.params]
# Training parameters
epochs = 1
steps_per_epoch = 50
batch_size = 128
alpha_max = 0.003
alpha_min = 0.0003
warmup_iter = 5
theta = 10000
cooldown_iter = 45
checkpoint_every = 5
# DDP params
world_size = 2
num_nodes = 1

[validation.params]
validate_every_steps = 5

[validation.data]
path = "tiny_stories_valid_token_out/"
tag = "shard_"
num_shards = 10

[data.params]
path = "tiny_stories_train_token_out/"
tag = "shard_"
num_shards = 100

[model]
name = "cs336_basics.TransformerLM.TransformerLM"

[model.params]
vocab_size = 32000
context_length = 256
num_layers = 48
d_model = 1600
num_heads = 25
d_ff = 6400
device = "cuda"

[optimizer]
name = "cs336_basics.adamW.AdamW"

[optimizer.params]
weight_decay = 0.01
betas = [0.9, 0.95]
eps = 1e-8
